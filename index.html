<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prayer Request</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Nunito:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; width: 100%; }
    body {
      min-height: 100vh;
      background: #0d0500;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 20px;
      position: relative; overflow-x: hidden;
    }
    .bg-glow { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(80px); z-index: 0; }
    .g1 { width: 700px; height: 700px; background: radial-gradient(circle, rgba(180,70,10,0.38) 0%, transparent 70%); top: -180px; right: -180px; animation: pulse1 8s ease-in-out infinite; }
    .g2 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(120,40,5,0.32) 0%, transparent 70%); bottom: -160px; left: -160px; animation: pulse2 10s ease-in-out infinite; }
    .g3 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(200,110,20,0.22) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); animation: pulse3 7s ease-in-out infinite; }
    .g4 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(160,60,5,0.2) 0%, transparent 70%); top: 20%; left: 10%; animation: pulse2 12s ease-in-out infinite; }
    .g5 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(210,120,10,0.15) 0%, transparent 70%); bottom: 15%; right: 8%; animation: pulse1 9s ease-in-out infinite; }
    @keyframes pulse1 { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.12); opacity: 0.75; } }
    @keyframes pulse2 { 0%,100% { transform: scale(1); opacity: 0.85; } 50% { transform: scale(1.18); opacity: 1; } }
    @keyframes pulse3 { 0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.7; } 50% { transform: translate(-50%,-50%) scale(1.25); opacity: 1; } }
    .vignette { position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.65) 100%); }
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .particle { position: absolute; background: rgba(220,150,50,0.6); border-radius: 50%; animation: floatup linear infinite; }
    @keyframes floatup { 0% { opacity: 0; transform: translateY(0) scale(0); } 15% { opacity: 1; transform: translateY(-15px) scale(1); } 85% { opacity: 0.4; } 100% { opacity: 0; transform: translateY(-140px) scale(0.2); } }
    .card { position: relative; z-index: 1; width: 100%; max-width: 460px; background: rgba(255,240,210,0.04); border: 1px solid rgba(200,140,55,0.22); border-radius: 24px; padding: 44px 40px 36px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); animation: risein 0.9s cubic-bezier(0.22,1,0.36,1) forwards; }
    .card::after { content: ''; position: absolute; inset: 0; border-radius: 24px; border: 1px solid rgba(255,200,80,0.06); pointer-events: none; }
    @keyframes risein { from { opacity: 0; transform: translateY(24px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .flame-wrap { display: flex; justify-content: center; margin-bottom: 22px; }
    .flame-svg { width: 38px; height: 54px; }
    @keyframes flicker { 0%,100% { transform: scaleX(1) scaleY(1) rotate(-1deg); } 25% { transform: scaleX(0.91) scaleY(1.05) rotate(1.5deg); } 50% { transform: scaleX(1.06) scaleY(0.97) rotate(-0.5deg); } 75% { transform: scaleX(0.95) scaleY(1.04) rotate(2deg); } }
    .flame-body { animation: flicker 2.6s ease-in-out infinite; transform-origin: 50% 92%; }
    .prayer-title { font-family: 'Playfair Display', serif; font-size: 25px; font-weight: 400; color: #F6E0B0; text-align: center; letter-spacing: 0.02em; margin-bottom: 8px; }
    .prayer-sub { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 300; color: rgba(220,185,125,0.6); text-align: center; line-height: 1.75; margin-bottom: 28px; }
    .divider { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .divider-line { flex: 1; height: 0.5px; background: rgba(200,140,55,0.18); }
    .divider-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(200,140,55,0.4); }
    .field-label { display: block; font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(210,165,95,0.65); margin-bottom: 9px; }
    .prayer-textarea { width: 100%; min-height: 155px; background: rgba(255,230,180,0.04); border: 1px solid rgba(200,140,55,0.18); border-radius: 14px; padding: 14px 16px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 300; color: #F0DEBA; line-height: 1.78; resize: vertical; outline: none; transition: border-color 0.3s, background 0.3s; caret-color: #D4A040; }
    .prayer-textarea::placeholder { color: rgba(200,155,85,0.3); }
    .prayer-textarea:focus { border-color: rgba(200,140,55,0.45); background: rgba(255,230,180,0.07); }
    .char-count { font-family: 'Nunito', sans-serif; font-size: 11px; color: rgba(200,155,85,0.35); text-align: right; margin-top: 6px; margin-bottom: 20px; transition: color 0.2s; }
    .char-count.warn { color: rgba(220,110,50,0.7); }
    .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #7A3A08 0%, #C07018 50%, #7A3A08 100%); background-size: 200% 100%; border: none; border-radius: 14px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.07em; color: #FFF2D5; cursor: pointer; transition: background-position 0.5s ease, transform 0.15s; position: relative; overflow: hidden; }
    .submit-btn:hover { background-position: 100% 0; transform: translateY(-1px); }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .shimmer { position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.09), transparent); transform: translateX(-100%); transition: transform 0.55s; }
    .submit-btn:hover .shimmer { transform: translateX(100%); }
    .notice { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 300; color: rgba(200,155,85,0.35); text-align: center; margin-top: 14px; line-height: 1.6; }
    .toast { display: none; margin-top: 14px; padding: 11px 16px; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 13px; text-align: center; animation: fadein 0.3s ease; }
    @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .toast.success { background: rgba(50,110,50,0.2); border: 0.5px solid rgba(70,170,70,0.3); color: #90EAA0; }
    .toast.error { background: rgba(130,35,25,0.2); border: 0.5px solid rgba(190,70,50,0.3); color: #F0A090; }
    .debug { display: none; margin-top: 8px; padding: 10px 14px; border-radius: 10px; background: rgba(0,0,0,0.3); border: 0.5px solid rgba(255,200,80,0.12); font-family: monospace; font-size: 11px; color: rgba(255,200,100,0.75); word-break: break-all; white-space: pre-wrap; line-height: 1.7; animation: fadein 0.3s ease; }
  </style>
</head>
<body>
  <div class="bg-glow g1"></div>
  <div class="bg-glow g2"></div>
  <div class="bg-glow g3"></div>
  <div class="bg-glow g4"></div>
  <div class="bg-glow g5"></div>
  <div class="vignette"></div>
  <div class="particles" id="particles"></div>

  <div class="card">
    <div class="flame-wrap">
      <svg class="flame-svg" viewBox="0 0 38 54" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="fg1" x1="19" y1="6" x2="19" y2="50" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#D4A030" stop-opacity="0.95"/>
            <stop offset="55%" stop-color="#C04E10" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#8B2800" stop-opacity="0.6"/>
          </linearGradient>
          <linearGradient id="fg2" x1="19" y1="12" x2="19" y2="46" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FFEECC" stop-opacity="0.98"/>
            <stop offset="60%" stop-color="#F0A030" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="#C04E10" stop-opacity="0.3"/>
          </linearGradient>
        </defs>
        <g class="flame-body">
          <ellipse cx="19" cy="46" rx="5.5" ry="4.5" fill="rgba(170,80,8,0.55)"/>
          <path d="M19 50 C10 46 6 37 8 27 C10 18 15 14 13 6 C17 13 15 19 19 23 C23 19 21 13 25 6 C23 15 28 18 30 27 C32 37 28 46 19 50Z" fill="url(#fg1)"/>
          <path d="M19 46 C13 42 11 34 14 27 C16 21 19 19 18 13 C21 18 19 24 21 27 C23 24 21 18 24 13 C23 19 26 21 24 29 C22 37 24 43 19 46Z" fill="url(#fg2)"/>
          <ellipse cx="19" cy="25" rx="3.2" ry="4.2" fill="rgba(255,245,190,0.65)"/>
        </g>
      </svg>
    </div>

    <h1 class="prayer-title">Submit a Prayer Request</h1>
    <p class="prayer-sub">Share what's on your heart.<br>We will pray with you and for you.</p>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <label class="field-label" for="p-request">Your prayer request</label>
    <textarea class="prayer-textarea" id="p-request" placeholder="Write your prayer request here..." maxlength="800" oninput="updateCount()"></textarea>
    <div class="char-count" id="char-count">0 / 800</div>

    <button class="submit-btn" id="p-submit" onclick="submitPrayer()">
      <span class="shimmer"></span>
      Send Prayer Request
    </button>

    <div class="toast" id="p-toast"></div>
    <div class="debug" id="p-debug"></div>
    <p class="notice">Received with care &nbsp;·&nbsp; Held in confidence</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    emailjs.init({ publicKey: 'AxJ3T3BtPHjqeUpkZ' });

    const pc = document.getElementById('particles');
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `left:${Math.random()*100}%;bottom:${Math.random()*40}%;animation-duration:${4+Math.random()*7}s;animation-delay:${Math.random()*10}s;opacity:0;width:${Math.random()>0.6?3:2}px;height:${Math.random()>0.6?3:2}px;`;
      pc.appendChild(p);
    }

    function updateCount() {
      const len = document.getElementById('p-request').value.length;
      const el = document.getElementById('char-count');
      el.textContent = len + ' / 800';
      el.className = 'char-count' + (len > 720 ? ' warn' : '');
    }

    function showToast(msg, type) {
      const t = document.getElementById('p-toast');
      t.textContent = msg;
      t.className = 'toast ' + type;
      t.style.display = 'block';
    }

    function showDebug(err) {
      const d = document.getElementById('p-debug');
      let msg = '';
      if (err && err.status && err.text) {
        msg = 'Status ' + err.status + ': ' + err.text;
      } else if (typeof err === 'string') {
        msg = err;
      } else {
        try { msg = JSON.stringify(err, null, 2); } catch(e) { msg = String(err); }
      }
      d.textContent = msg;
      d.style.display = 'block';
    }

    function submitPrayer() {
      const request = document.getElementById('p-request').value.trim();
      if (!request) { showToast('Please write your prayer request before sending.', 'error'); return; }

      const btn = document.getElementById('p-submit');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      document.getElementById('p-debug').style.display = 'none';
      document.getElementById('p-toast').style.display = 'none';

      emailjs.send('service_20j63xt', 'template_vmpkuk4', { prayer_request: request })
        .then(() => {
          showToast('Your prayer has been received. We are praying with you.', 'success');
          document.getElementById('p-request').value = '';
          updateCount();
        })
        .catch((err) => {
          showToast('Something went wrong. See details below.', 'error');
          showDebug(err);
        })
        .finally(() => {
          btn.disabled = false;
          btn.innerHTML = '<span class="shimmer"></span>Send Prayer Request';
        });
    }
  </script>
</body>
</html>
